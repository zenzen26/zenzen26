name: Generate Cat Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write        # for pushing code
  actions: read
  id-token: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: generate git-contribution-cat-graph.svg
        uses: zenzen26/git-contribution-cat-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ github.token }}

      - name: push git-contribution-cat-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ github.token }}