name: Generate Calico Cat Contribution Graph

on:
  schedule:
    - cron: "0 */6 * * *"  # Runs every 6 hours for fresh animation
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Custom cat-themed contribution graph generator
      - name: Generate Cat Contribution Graph
        uses: Platane/snk@v3
        with:
          github_user_name: zenzen26
          outputs: |
            dist/cat-contribution-graph-dark.svg?palette=github-dark&color_snake=#FFAA00&color_dots=#DA3D20,#519A66,#FFAA00,#ebedf0
            dist/cat-contribution-graph-light.svg?palette=github-light&color_snake=#DA3D20&color_dots=#519A66,#FFAA00,#DA3D20,#ebedf0
            
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
